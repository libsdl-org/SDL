name: Build (Emscripten)

on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  emscripten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.35
      - name: Install requirements
        run: |
          sudo apt-get -y update
          sudo apt-get install -y ninja-build python3-selenium
      - name: Download geckodriver
        run: |
          wget "https://github.com/mozilla/geckodriver/releases/download/v0.34.0/geckodriver-v0.34.0-linux64.tar.gz" \
            --quiet -O /tmp/geckodriver.tar.gz
          mkdir -p ${{ github.workspace }}/drivers
          tar xf /tmp/geckodriver.tar.gz -C "${{ github.workspace }}/drivers"
          echo "${{ github.workspace }}/drivers" >>$GITHUB_PATH
      - name: Verify Web Drivers
        run: |
          geckodriver --version
          chromedriver --version

      - name: Configure (CMake)
        run: |
          emcmake cmake -S . -B build \
            -Wdeprecated -Wdev -Werror \
            -DCMAKE_C_FLAGS="-gsource-map -ffile-prefix-map=${{ github.workspace }}=/SDL" \
            -DCMAKE_EXE_LINKER_FLAGS="--source-map-base /" \
            -DSDL_WERROR=ON \
            -DSDL_TESTS=ON \
            -DSDL_TESTS_TIMEOUT_MULTIPLIER=4 \
            -DSDL_INSTALL_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_INSTALL_PREFIX=prefix \
            -GNinja
      - name: Build (CMake)
        id: build
        run: cmake --build build/ --verbose
      - name: Run build-time tests (CMake)
        run: |
          set -eu
          # Start local HTTP server
          cmake --build build --target serve-sdl-tests --verbose &
          ctest -VV --test-dir build/
      - name: Install (CMake)
        run: |
          echo "SDL3_DIR=$(pwd)/prefix" >> $GITHUB_ENV
          cmake --install build/
      - name: Package (CPack)
        if: ${{ always() && steps.build.outcome == 'success' }}
        run: |
          cmake --build build/ --config Debug --target package
      - name: Verify CMake configuration files
        run: |
          emcmake cmake -S cmake/test -B cmake_config_build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSDL_VENDOR_INFO="Github Workflow" \
            -DTEST_SHARED=FALSE \
            -DSDL_DISABLE_INSTALL_DOCS=OFF \
            -DCMAKE_PREFIX_PATH=${{ env.SDL3_DIR }}
          cmake --build cmake_config_build --verbose
      - uses: actions/upload-artifact@v4
        if: ${{ always() && matrix.platform.artifact != '' && steps.build.outcome == 'success' }}
        with:
          if-no-files-found: error
          name: SDL-emscripten
          path: build/dist/SDL3*
